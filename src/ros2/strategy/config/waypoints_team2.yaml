strategy_node:
  ros__parameters:
    # Точки маршрута: [x, y, yaw] в метрах
    waypoints: [
      0.625, -0.625, 3.14,     # Стартовая зона B
      0.0, -0.625, 3.14,        # Центр нижней части
      -0.625, 0.0, -1.57,       # Левая часть
      0.625, 0.0, 1.57,         # Правая часть
      0.625, 0.625, 3.14,       # Зона хранения
      0.0, 0.625, 0.0           # Верхняя часть
    ]
    
    # Команды для элеватора
    elevator_order: [1, 1, 2, 1, 2, 3]
    
    # Моменты сброса препятствий
    obstacle_release: ["obstacle3", "obstacle4"]
    
    # Стоимость объектов
    object_values: [10, 20, -5, 15, -10]
    
    # Время до конца матча
    time_until_end: 75
