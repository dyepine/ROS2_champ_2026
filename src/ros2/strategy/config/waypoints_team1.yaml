strategy_node:
  ros__parameters:
    # Точки маршрута: [x, y, yaw] в метрах
    waypoints: [
      -0.625, -0.625, 0.0,    # Стартовая зона A
      0.0, -0.625, 0.0,        # Центр нижней части
      0.625, 0.0, 1.57,        # Правая часть
      -0.625, 0.0, -1.57,      # Левая часть
      -0.625, 0.625, 0.0,      # Зона хранения
      0.0, 0.625, 3.14         # Верхняя часть
    ]
    
    # Команды для элеватора (1 - захват, 2 - отпускание, 3 - выгрузка в зону)
    elevator_order: [1, 1, 2, 1, 2, 3]
    
    # Моменты сброса препятствий
    obstacle_release: ["obstacle1", "obstacle2"]
    
    # Стоимость объектов (положительные и отрицательные)
    object_values: [10, 20, -5, 15, -10]
    
    # Время до конца матча (секунды)
    time_until_end: 75
